name: '🧪 Test Plugin'

permissions:
  contents: read

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/test.yaml@master
    with:
      # Explicitly install net10 rather than relying on the runner image (shared default is 9.0.x).
      dotnet-version: "10.0.x"
