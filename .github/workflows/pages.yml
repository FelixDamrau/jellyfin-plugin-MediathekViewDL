name: Deploy VueJS Preview to Pages

on:
  push:
    branches: ["master"]
    paths:
      - 'Jellyfin.Plugin.MediathekViewDL/Configuration/Web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Jellyfin.Plugin.MediathekViewDL/Configuration/Web/VueJS/package-lock.json'

      - name: Install dependencies
        working-directory: Jellyfin.Plugin.MediathekViewDL/Configuration/Web/VueJS
        run: npm ci

      - name: Build VueJS
        working-directory: Jellyfin.Plugin.MediathekViewDL/Configuration/Web/VueJS
        run: npm run build

      - name: Prepare artifact
        run: |
          mkdir deployment
          cp Jellyfin.Plugin.MediathekViewDL/Configuration/Web/index_preview.html deployment/index.html
          cp Jellyfin.Plugin.MediathekViewDL/Configuration/Web/VueJS/dist/MediathekViewDLVueJS.js deployment/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deployment'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
