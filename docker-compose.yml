services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin-dev
    ports:
      - "8096:8096"
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
    restart: unless-stopped
    depends_on:
      builder:
        condition: service_completed_successfully
    networks:
      - plugin-dev

  nginx-proxy:
    image: nginx:alpine
    container_name: jellyfin-ui-proxy
    ports:
      - "8097:8097"
    volumes:
      - ./Debug/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./Jellyfin.Plugin.MediathekViewDL/Configuration/Web:/app:ro
    networks:
      - plugin-dev

  builder:
    build:
      context: .
      dockerfile: Debug/Dockerfile.builder
    container_name: jellyfin-builder
    volumes:
      - .:/src:rw
      - jellyfin-config:/jellyfin-config:rw
    command: >
      bash -c "
        /bin/bash ./Debug/build-jprm.sh &&
        mkdir -p /jellyfin-config/plugins/TemplatePlugin &&
        unzip -o ./Debug/artifacts/*.zip -d /jellyfin-config/plugins/TemplatePlugin/
      "

networks:
  plugin-dev:

volumes:
  jellyfin-config:
  jellyfin-cache:
